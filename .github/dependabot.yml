version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: [ "react*", "@types/react*" ]
      vite:
        patterns: [ "vite*", "@vitejs/*" ]
      supabase:
        patterns: [ "@supabase/*" ]
    ignore:
      - dependency-name: "*"
        update-types: [ "version-update:semver-major" ]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: [ "version-update:semver-major" ]
